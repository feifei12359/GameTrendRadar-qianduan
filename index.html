<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameTrend Radar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1419;
      color: white;
    }

    header {
      border-bottom: 1px solid #2a3a4a;
      padding: 1rem 1.5rem;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-section h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
    }

    .title-section p {
      font-size: 0.875rem;
      color: white;
      margin: 0.25rem 0 0 0;
    }

    .btn-primary {
      background: #007acc;
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary:hover {
      background: #005a9e;
    }

    main {
      padding: 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-card.worth {
      border-color: #10b981;
    }

    .stat-card.ignore {
      border-color: #ef4444;
    }

    .stat-card.pending {
      border-color: #eab308;
    }

    .stat-value {
      font-size: 1.875rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .stat-card.worth .stat-value {
      color: #10b981;
    }

    .stat-card.ignore .stat-value {
      color: #ef4444;
    }

    .stat-card.pending .stat-value {
      color: #eab308;
    }

    .stat-label {
      font-size: 0.875rem;
      color: white;
    }

    .panel {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .panel h2 {
      font-size: 1.125rem;
      margin: 0 0 1rem 0;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .btn-action {
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .btn-action:hover {
      background: #374151;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #374151;
    }

    th {
      background: #111827;
      font-weight: 600;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .status-badge.worth {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }

    .status-badge.ignore {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #9ca3af;
    }

    .task-log {
      max-height: 15rem;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .task-indicator {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 9999px;
      margin-top: 0.5rem;
      background: #3b82f6;
    }

    .task-indicator.error {
      background: #ef4444;
    }

    .task-indicator.success {
      background: #10b981;
    }

    .task-text {
      font-size: 0.875rem;
      flex: 1;
    }

    .message-box {
      padding: 0.625rem;
      border-radius: 0.3125rem;
      margin: 0.625rem 1.25rem;
      font-weight: bold;
    }

    .message-box.success {
      background: #10b981;
    }

    .message-box.error {
      background: #ef4444;
    }

    .message-box.info {
      background: #3b82f6;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="header-content">
        <div class="title-section">
          <h1>📊 GameTrend Radar</h1>
          <p>跨平台新标签监控 + 爆发预测</p>
        </div>
        <button class="btn-primary" id="btn-full-detection">
          🔍 运行完整检测
        </button>
      </div>
    </header>

    <div id="message-container"></div>

    <main>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">总游戏数</div>
        </div>
        <div class="stat-card worth">
          <div class="stat-value" id="stat-worth">0</div>
          <div class="stat-label">值得做</div>
        </div>
        <div class="stat-card ignore">
          <div class="stat-value" id="stat-ignore">0</div>
          <div class="stat-label">忽略</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">待检测</div>
        </div>
      </div>

      <div class="panel">
        <h2>趋势数据</h2>
        <div class="button-group">
          <button class="btn-action" id="btn-load-exploding">💥 爆发趋势</button>
          <button class="btn-action" id="btn-load-early">🌱 早期趋势</button>
          <button class="btn-action" id="btn-load-all">📚 全部趋势</button>
          <div style="display:flex;gap:0.5rem;align-items:center;flex:1;min-width:260px">
            <input id="api-base-input" placeholder="API_BASE，例如 https://your-backend/api" style="flex:1;background:#111827;border:1px solid #4b5563;border-radius:0.5rem;padding:0.5rem;color:white" />
            <button class="btn-action" id="btn-save-api-base">💾 保存地址</button>
            <button class="btn-action" id="btn-test-api">🧪 测试连接</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>趋势列表 (<span id="trend-count">0</span>)</h2>
        <div class="table-container">
          <table id="trend-table">
            <thead>
              <tr>
                <th>词</th>
                <th>预测分</th>
                <th>增长率</th>
                <th>加速度</th>
                <th>平台分</th>
                <th>AI分</th>
                <th>首次出现</th>
                <th>平台</th>
              </tr>
            </thead>
            <tbody id="trend-tbody">
              <tr>
                <td colspan="8" class="empty-state">暂无趋势数据，请选择上方分类加载</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>新词列表 (<span id="new-words-count">0</span>)</h2>
        <div class="table-container">
          <table id="new-words-table">
            <thead>
              <tr>
                <th>词</th>
                <th>新颖分</th>
                <th>最近出现</th>
                <th>总出现</th>
                <th>首次出现</th>
              </tr>
            </thead>
            <tbody id="new-words-tbody">
              <tr>
                <td colspan="5" class="empty-state">暂无新词数据，请点击“新词”加载</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>任务日志</h2>
        <div class="task-log" id="task-log">
          <div style="text-align: center; padding: 2rem; color: white;">暂无任务记录</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    var trends = [];
    var tasks = [];
    var stats = { total: 0, worthDoing: 0, ignore: 0, pending: 0 };
    function normalizeApiBase(u) {
      var s = String(u || '').trim();
      if (!s) return '';
      if (s.endsWith('/')) s = s.slice(0, -1);
      if (!/\/api$/.test(s)) s = s + '/api';
      return s;
    }
    var API_BASE = (function () {
      var v = window.NEXT_PUBLIC_API_URL || window.API_BASE || localStorage.getItem('API_BASE');
      if (v) return normalizeApiBase(v);
      var h = location.hostname;
      var p = location.protocol;
      if (h.endsWith('vercel.app')) return normalizeApiBase('https://gametrendradar-backend-production.up.railway.app');
      if (h === 'localhost') return normalizeApiBase('http://localhost:3000');
      return normalizeApiBase(p === 'https:' ? 'https://gametrendradar-backend-production.up.railway.app' : 'http://localhost:3000');
    })();

    function showMessage(text, type) {
      var container = document.getElementById('message-container');
      var messageClass = 'message-box ' + (type || 'info');
      container.innerHTML = '<div class="' + messageClass + '">' + text + '</div>';
    }

    function addTaskLog(text) {
      var timestamp = new Date().toLocaleString('zh-CN');
      var logText = timestamp + ' - ' + text;
      tasks.push(logText);
      renderTaskLog();
    }

    function renderTaskLog() {
      var container = document.getElementById('task-log');
      if (tasks.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 2rem; color: white;">暂无任务记录</div>';
        return;
      }

      container.innerHTML = tasks.map(function (task) {
        var isError = task.indexOf('失败') !== -1 || task.indexOf('错误') !== -1;
        var isSuccess = task.indexOf('成功') !== -1;
        var indicatorClass = 'task-indicator';
        if (isError) indicatorClass += ' error';
        if (isSuccess) indicatorClass += ' success';

        return '<div class="task-item">' +
          '<div class="' + indicatorClass + '"></div>' +
          '<div class="task-text">' + task + '</div>' +
          '</div>';
      }).join('');
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = trends.length;
      document.getElementById('stat-worth').textContent = 0;
      document.getElementById('stat-ignore').textContent = 0;
      document.getElementById('stat-pending').textContent = 0;
      var c = document.getElementById('trend-count'); if (c) c.textContent = trends.length;
    }

    function renderTrends() {
      var tbody = document.getElementById('trend-tbody');

      if (!trends || trends.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无趋势数据，请选择上方分类加载</td></tr>';
        return;
      }

      tbody.innerHTML = trends.map(function (t) {
        var first = t.first_seen_at ? new Date(t.first_seen_at).toLocaleString('zh-CN') : '';
        var plats = Array.isArray(t.platforms) ? t.platforms.join(', ') : '';
        return '<tr>' +
          '<td>' + (t.word || '') + '</td>' +
          '<td>' + (t.prediction_score || 0) + '</td>' +
          '<td>' + (t.growth_rate || 0) + '</td>' +
          '<td>' + (t.acceleration || 0) + '</td>' +
          '<td>' + (t.platform_score || 0) + '</td>' +
          '<td>' + (t.ai_score || 0) + '</td>' +
          '<td>' + first + '</td>' +
          '<td>' + plats + '</td>' +
          '</tr>';
      }).join('');
    }

    function fetchTrends(endpoint, label) {
      showMessage('🔄 正在加载' + label + '...', 'info');
      addTaskLog('开始加载' + label + '...');
      var url = API_BASE + endpoint;
      addTaskLog('请求: ' + url);
      fetch(url, { method: 'GET' })
        .then(function (response) {
          if (!response.ok) throw new Error('HTTP错误: ' + response.status + ' ' + response.statusText);
          return response.json();
        })
        .then(function (data) {
          trends = Array.isArray(data) ? data : [];
          updateStats();
          renderTrends();
          showMessage('✅ 加载了 ' + trends.length + ' 条数据', 'success');
          addTaskLog('成功加载' + label);
        })
        .catch(function (err) {
          showMessage('❌ 加载出错: ' + err.message, 'error');
          addTaskLog('加载出错: ' + err.message);
        });
    }

    function callApi(endpoint, actionName) {
      showMessage('🔄 正在' + actionName + '...', 'info');
      addTaskLog('开始' + actionName + '...');

      fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        credentials: 'omit'
      })
        .then(function (response) {
          if (response.ok) {
            showMessage('✅ ' + actionName + '成功！', 'success');
            addTaskLog(actionName + '成功');
            setTimeout(function () {
              fetchGames();
            }, 1000);
          } else {
            showMessage('❌ ' + actionName + '失败', 'error');
            addTaskLog(actionName + '失败');
          }
        })
        .catch(function (err) {
          console.error(actionName + '错误:', err);
          showMessage('❌ ' + actionName + '出错: ' + err.message, 'error');
          addTaskLog(actionName + '出错: ' + err.message);
        });
    }

    function renderNewWords(items) {
      var tbody = document.getElementById('new-words-tbody');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无新词数据，请点击“新词”加载</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(function (it) {
        var token = it.token || '';
        var novelty = it.noveltyScore || 0;
        var recent = it.recentCount || 0;
        var total = it.totalCount || 0;
        var first = it.firstSeenAt ? new Date(it.firstSeenAt).toLocaleString('zh-CN') : '';
        return '<tr>' +
          '<td>' + token + '</td>' +
          '<td>' + novelty + '</td>' +
          '<td>' + recent + '</td>' +
          '<td>' + total + '</td>' +
          '<td>' + first + '</td>' +
          '</tr>';
      }).join('');
    }

    function fetchNewWords() {
      showMessage('🔄 正在加载新词...', 'info');
      addTaskLog('开始加载新词...');
      var url = API_BASE + '/new-words';
      addTaskLog('请求新词: ' + url);
      fetch(url, { method: 'GET' })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP错误: ' + response.status + ' ' + response.statusText);
          }
          return response.json();
        })
        .then(function (data) {
          var items = Array.isArray(data.items) ? data.items.slice() : [];
          items.sort(function (a, b) { return (b.noveltyScore || 0) - (a.noveltyScore || 0); });
          renderNewWords(items);
          document.getElementById('new-words-count').textContent = items.length;
          showMessage('✅ 加载了 ' + items.length + ' 个新词', 'success');
          addTaskLog('成功加载新词');
        })
        .catch(function (err) {
          console.error('获取新词错误:', err);
          showMessage('❌ 获取新词出错: ' + err.message, 'error');
          addTaskLog('获取新词出错: ' + err.message);
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('btn-full-detection').addEventListener('click', function () {
        callApi('/daily-job', '执行完整检测');
      });

      document.getElementById('btn-load-exploding').addEventListener('click', function () {
        fetchTrends('/trend/exploding', '爆发趋势');
      });
      document.getElementById('btn-load-early').addEventListener('click', function () {
        fetchTrends('/trend/early', '早期趋势');
      });
      document.getElementById('btn-load-all').addEventListener('click', function () {
        fetchTrends('/trend/all', '全部趋势');
      });
      document.getElementById('btn-save-api-base').addEventListener('click', function () {
        var input = document.getElementById('api-base-input');
        var url = (input && input.value || '').trim();
        if (!url) {
          showMessage('❌ API_BASE 为空', 'error');
          addTaskLog('API_BASE 为空');
          return;
        }
        API_BASE = normalizeApiBase(url);
        localStorage.setItem('API_BASE', API_BASE);
        showMessage('✅ 已保存 API_BASE', 'success');
        addTaskLog('已设置 API_BASE 为 ' + API_BASE);
        setTimeout(function(){ fetchTrends('/trend/exploding','爆发趋势') }, 500);
      });
      var input = document.getElementById('api-base-input');
      if (input) {
        input.value = API_BASE;
      }

      document.getElementById('btn-test-api').addEventListener('click', function () {
        var url = API_BASE + '/health';
        addTaskLog('测试后端连接: ' + url);
        fetch(url, { method: 'GET' })
          .then(function (response) {
            if (!response.ok) throw new Error('HTTP错误: ' + response.status + ' ' + response.statusText);
            return response.json();
          })
          .then(function (data) {
            showMessage('✅ 后端健康: ' + (data.ok ? 'OK' : 'FAIL') + ' ' + (data.time || ''), 'success');
            addTaskLog('后端健康检查成功');
          })
          .catch(function (err) {
            showMessage('❌ 连接失败: ' + err.message, 'error');
            addTaskLog('连接失败: ' + err.message);
          });
      });

      fetchTrends('/trend/exploding','爆发趋势');
    });
  </script>
</body>

</html>
