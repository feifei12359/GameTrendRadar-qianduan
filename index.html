<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏趋势雷达 - 仪表盘</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            background: '#f8fafc',
            card: '#ffffff',
            border: '#e5e7eb',
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .sidebar-width {
        width: 260px;
      }
    }
  </style>
  
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .chart-container {
      position: relative;
      height: 300px;
    }
  </style>
</head>
<body class="bg-background min-h-screen">
  <div class="flex h-screen overflow-hidden">
    <!-- 侧边栏 -->
    <aside class="sidebar-width bg-white border-r border-gray-200 flex flex-col">
      <!-- Logo -->
      <div class="p-6 border-b border-gray-100">
        <div class="flex items-center space-x-3">
          <i class="fa fa-line-chart text-primary text-2xl"></i>
          <h1 class="text-xl font-semibold text-gray-800">游戏趋势雷达</h1>
        </div>
      </div>
      
      <!-- 导航 -->
      <nav class="flex-1 p-4">
        <ul class="space-y-2">
          <li>
            <a href="#" class="nav-link active flex items-center space-x-3 px-4 py-3 rounded-lg" data-target="exploding">
              <i class="fa fa-rocket text-primary"></i>
              <span>🚀 爆发趋势</span>
            </a>
          </li>
          <li>
            <a href="#" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg" data-target="early">
              <i class="fa fa-seedling text-gray-600"></i>
              <span>🌱 早期趋势</span>
            </a>
          </li>
          <li>
            <a href="#" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg" data-target="all">
              <i class="fa fa-bar-chart text-gray-600"></i>
              <span>📊 所有趋势</span>
            </a>
          </li>
          <li>
            <a href="#" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg" data-target="new-words">
              <i class="fa fa-brain text-gray-600"></i>
              <span>🧠 新词</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>
    
    <!-- 主内容 -->
    <main class="flex-1 overflow-y-auto bg-background p-8">
      <!-- 头部 -->
      <header class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">游戏趋势雷达仪表盘</h2>
        <button id="run-detection" class="bg-primary hover:bg-blue-700 text-white rounded-lg px-5 py-2 shadow-sm flex items-center space-x-2">
          <i class="fa fa-refresh"></i>
          <span>运行检测</span>
        </button>
      </header>
      
      <!-- 搜索栏 -->
      <div class="mb-8">
        <input type="text" id="search-input" placeholder="搜索关键词..." 
               class="rounded-lg border border-gray-300 px-4 py-2 w-80 focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      
      <!-- 统计卡片 -->
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-medium text-gray-500">爆发趋势</h3>
            <i class="fa fa-rocket text-primary"></i>
          </div>
          <p class="text-2xl font-bold text-gray-800" id="exploding-count">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-medium text-gray-500">早期趋势</h3>
            <i class="fa fa-seedling text-green-500"></i>
          </div>
          <p class="text-2xl font-bold text-gray-800" id="early-count">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-medium text-gray-500">所有趋势</h3>
            <i class="fa fa-bar-chart text-blue-500"></i>
          </div>
          <p class="text-2xl font-bold text-gray-800" id="all-count">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-medium text-gray-500">新词</h3>
            <i class="fa fa-brain text-purple-500"></i>
          </div>
          <p class="text-2xl font-bold text-gray-800" id="new-words-count">0</p>
        </div>
      </div>
      
      <!-- 趋势图表 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">关键词增长趋势</h3>
        <div class="chart-container">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
      
      <!-- 数据表格 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-8">
        <div class="p-6 border-b border-gray-100">
          <h3 class="text-lg font-semibold text-gray-800" id="table-title">爆发趋势</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr id="table-header">
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">关键词</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">预测分数</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">增长率</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">加速度</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">平台分数</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">AI 分数</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">首次发现</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200" id="table-body">
              <!-- 数据将由 JavaScript 填充 -->
              <tr>
                <td colspan="7" class="px-6 py-10 text-center text-gray-500">
                  <i class="fa fa-spinner fa-spin mr-2"></i> 加载中...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="p-4 border-t border-gray-100 flex justify-between items-center">
          <div class="text-sm text-gray-500" id="pagination-info">显示 0-0 共 0</div>
          <div class="flex space-x-2">
            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-600 hover:bg-gray-50" id="prev-page" disabled>
              <i class="fa fa-chevron-left"></i>
            </button>
            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-600 hover:bg-gray-50" id="next-page" disabled>
              <i class="fa fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
      
      <!-- AI 分析面板 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">AI 趋势洞察</h3>
        <p class="text-gray-600" id="ai-insight">
          AI 检测到 'Roblox Obby' 相关趋势正在上升。过去 7 天增长率提高了 120%。
        </p>
      </div>
      
      <!-- 任务日志 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-50 overflow-y-auto p-4">
        <h3 class="text-sm font-semibold text-gray-800 mb-3">任务日志</h3>
        <div class="space-y-2" id="task-log">
          <div class="text-sm text-gray-600">
            <span class="text-gray-400">[2024-03-10 12:00:00]</span> 系统初始化完成
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    // API 配置
    const API_BASE = "https://gametrenradar-backend-production.up.railway.app/api";
    
    // 全局变量
    let currentPage = 1;
    const pageSize = 10;
    let currentData = [];
    let currentFilter = 'exploding';
    let trendChart = null;
    
    // DOM 元素
    const navLinks = document.querySelectorAll('.nav-link');
    const runDetectionBtn = document.getElementById('run-detection');
    const searchInput = document.getElementById('search-input');
    const tableBody = document.getElementById('table-body');
    const tableTitle = document.getElementById('table-title');
    const tableHeader = document.getElementById('table-header');
    const paginationInfo = document.getElementById('pagination-info');
    const prevPageBtn = document.getElementById('prev-page');
    const nextPageBtn = document.getElementById('next-page');
    const taskLog = document.getElementById('task-log');
    const explodingCount = document.getElementById('exploding-count');
    const earlyCount = document.getElementById('early-count');
    const allCount = document.getElementById('all-count');
    const newWordsCount = document.getElementById('new-words-count');
    
    // 初始化应用
    async function init() {
      logTask('正在初始化游戏趋势雷达仪表盘...');
      await loadData('exploding');
      await updateStats();
      logTask('仪表盘初始化成功');
    }
    
    // 从 API 加载数据
    async function loadData(filter) {
      currentFilter = filter;
      currentPage = 1;
      
      try {
        logTask(`正在加载${getFilterName(filter)}...`);
        
        let url;
        switch (filter) {
          case 'exploding':
            url = `${API_BASE}/trend/exploding`;
            tableTitle.textContent = '爆发趋势';
            break;
          case 'early':
            url = `${API_BASE}/trend/early`;
            tableTitle.textContent = '早期趋势';
            break;
          case 'all':
            url = `${API_BASE}/trend/all`;
            tableTitle.textContent = '所有趋势';
            break;
          case 'new-words':
            url = `${API_BASE}/new-words`;
            tableTitle.textContent = '新词';
            break;
        }
        
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        let data;
        if (filter === 'new-words') {
          const result = await response.json();
          data = result.items || [];
        } else {
          data = await response.json();
        }
        
        currentData = data;
        updateTable();
        updateChart(data);
        logTask(`${getFilterName(filter)}加载成功`);
      } catch (error) {
        console.error('加载数据失败:', error);
        logTask(`加载${getFilterName(filter)}失败: ${error.message}`);
        showError('加载数据失败，请重试。');
      }
    }
    
    // 获取过滤器名称
    function getFilterName(filter) {
      switch (filter) {
        case 'exploding': return '爆发趋势';
        case 'early': return '早期趋势';
        case 'all': return '所有趋势';
        case 'new-words': return '新词';
        default: return '数据';
      }
    }
    
    // 更新统计数据
    async function updateStats() {
      try {
        const [exploding, early, all, newWords] = await Promise.all([
          fetch(`${API_BASE}/trend/exploding`).then(res => res.json()),
          fetch(`${API_BASE}/trend/early`).then(res => res.json()),
          fetch(`${API_BASE}/trend/all`).then(res => res.json()),
          fetch(`${API_BASE}/new-words`).then(res => res.json())
        ]);
        
        explodingCount.textContent = exploding.length;
        earlyCount.textContent = early.length;
        allCount.textContent = all.length;
        newWordsCount.textContent = newWords.items ? newWords.items.length : 0;
      } catch (error) {
        console.error('更新统计数据失败:', error);
      }
    }
    
    // 更新表格
    function updateTable() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const paginatedData = currentData.slice(start, end);
      
      tableBody.innerHTML = '';
      
      if (paginatedData.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="px-6 py-10 text-center text-gray-500">
              暂无数据
            </td>
          </tr>
        `;
        paginationInfo.textContent = '显示 0-0 共 0';
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        return;
      }
      
      paginatedData.forEach(item => {
        const row = document.createElement('tr');
        
        if (currentFilter === 'new-words') {
          row.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900">${item.token}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${(item.noveltyScore * 100).toFixed(1)}%</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.recentCount}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.totalCount}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.firstSeenAt}</div>
            </td>
            <td colspan="2" class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-500">-</div>
            </td>
          `;
        } else {
          row.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900">${item.keyword}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.prediction_score.toFixed(1)}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${(item.growth_rate * 100).toFixed(1)}%</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${(item.acceleration * 100).toFixed(1)}%</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.platform_score.toFixed(1)}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${item.ai_score.toFixed(1)}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">${new Date(item.first_seen_at).toLocaleDateString()}</div>
            </td>
          `;
        }
        
        tableBody.appendChild(row);
      });
      
      paginationInfo.textContent = `显示 ${start + 1}-${Math.min(end, currentData.length)} 共 ${currentData.length}`;
      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = end >= currentData.length;
    }
    
    // 更新图表
    function updateChart(data) {
      const ctx = document.getElementById('trend-chart').getContext('2d');
      
      // 获取前 5 个关键词
      const topKeywords = data.slice(0, 5);
      const labels = topKeywords.map(item => item.keyword || item.token);
      const scores = topKeywords.map(item => item.prediction_score || (item.noveltyScore * 100));
      
      if (trendChart) {
        trendChart.destroy();
      }
      
      trendChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '分数',
            data: scores,
            backgroundColor: '#2563eb',
            borderColor: '#1d4ed8',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: '分数'
              }
            }
          }
        }
      });
    }
    
    // 运行检测
    async function runDetection() {
      try {
        logTask('开始运行趋势检测任务...');
        runDetectionBtn.disabled = true;
        runDetectionBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 运行中...';
        
        const response = await fetch(`${API_BASE}/daily-job`, { method: 'POST' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const result = await response.json();
        
        if (result.success) {
          logTask('趋势检测任务执行成功');
          // 刷新数据
          await loadData(currentFilter);
          await updateStats();
        } else {
          logTask('趋势检测任务失败: ' + result.message);
        }
      } catch (error) {
        console.error('运行检测失败:', error);
        logTask(`运行检测失败: ${error.message}`);
      } finally {
        runDetectionBtn.disabled = false;
        runDetectionBtn.innerHTML = '<i class="fa fa-refresh"></i> <span>运行检测</span>';
      }
    }
    
    // 记录任务
    function logTask(message) {
      const now = new Date();
      const timestamp = now.toISOString().slice(0, 19).replace('T', ' ');
      
      const logItem = document.createElement('div');
      logItem.className = 'text-sm text-gray-600';
      logItem.innerHTML = `<span class="text-gray-400">[${timestamp}]</span> ${message}`;
      
      taskLog.appendChild(logItem);
      taskLog.scrollTop = taskLog.scrollHeight;
    }
    
    // 显示错误
    function showError(message) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="7" class="px-6 py-10 text-center text-red-500">
            <i class="fa fa-exclamation-circle mr-2"></i> ${message}
          </td>
        </tr>
      `;
    }
    
    // 事件监听器
    navLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        
        // 更新活动状态
        navLinks.forEach(l => l.classList.remove('active', 'bg-blue-50', 'text-blue-600', 'font-medium'));
        navLinks.forEach(l => l.classList.add('text-gray-600'));
        
        this.classList.add('active', 'bg-blue-50', 'text-blue-600', 'font-medium');
        this.classList.remove('text-gray-600');
        
        // 加载数据
        const target = this.getAttribute('data-target');
        loadData(target);
      });
    });
    
    runDetectionBtn.addEventListener('click', runDetection);
    
    searchInput.addEventListener('input', function() {
      const searchTerm = this.value.toLowerCase();
      
      if (searchTerm === '') {
        loadData(currentFilter);
        return;
      }
      
      const filteredData = currentData.filter(item => {
        if (currentFilter === 'new-words') {
          return item.token.toLowerCase().includes(searchTerm);
        } else {
          return item.keyword.toLowerCase().includes(searchTerm);
        }
      });
      
      currentData = filteredData;
      currentPage = 1;
      updateTable();
    });
    
    prevPageBtn.addEventListener('click', function() {
      if (currentPage > 1) {
        currentPage--;
        updateTable();
      }
    });
    
    nextPageBtn.addEventListener('click', function() {
      const maxPage = Math.ceil(currentData.length / pageSize);
      if (currentPage < maxPage) {
        currentPage++;
        updateTable();
      }
    });
    
    // 初始化
    init();
  </script>
</body>
</html>
