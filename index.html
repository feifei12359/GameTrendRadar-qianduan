<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameTrend Radar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1419;
      color: white;
    }

    header {
      border-bottom: 1px solid #2a3a4a;
      padding: 1rem 1.5rem;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-section h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
    }

    .title-section p {
      font-size: 0.875rem;
      color: white;
      margin: 0.25rem 0 0 0;
    }

    .btn-primary {
      background: #007acc;
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary:hover {
      background: #005a9e;
    }

    main {
      padding: 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-card.worth {
      border-color: #10b981;
    }

    .stat-card.ignore {
      border-color: #ef4444;
    }

    .stat-card.pending {
      border-color: #eab308;
    }

    .stat-value {
      font-size: 1.875rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .stat-card.worth .stat-value {
      color: #10b981;
    }

    .stat-card.ignore .stat-value {
      color: #ef4444;
    }

    .stat-card.pending .stat-value {
      color: #eab308;
    }

    .stat-label {
      font-size: 0.875rem;
      color: white;
    }

    .panel {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .panel h2 {
      font-size: 1.125rem;
      margin: 0 0 1rem 0;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .btn-action {
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .btn-action:hover {
      background: #374151;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #374151;
    }

    th {
      background: #111827;
      font-weight: 600;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .status-badge.worth {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }

    .status-badge.ignore {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #9ca3af;
    }

    .task-log {
      max-height: 15rem;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .task-indicator {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 9999px;
      margin-top: 0.5rem;
      background: #3b82f6;
    }

    .task-indicator.error {
      background: #ef4444;
    }

    .task-indicator.success {
      background: #10b981;
    }

    .task-text {
      font-size: 0.875rem;
      flex: 1;
    }

    .message-box {
      padding: 0.625rem;
      border-radius: 0.3125rem;
      margin: 0.625rem 1.25rem;
      font-weight: bold;
    }

    .message-box.success {
      background: #10b981;
    }

    .message-box.error {
      background: #ef4444;
    }

    .message-box.info {
      background: #3b82f6;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="header-content">
        <div class="title-section">
          <h1>📊 GameTrend Radar</h1>
          <p>HTML5 游戏趋势检测工具</p>
        </div>
        <button class="btn-primary" id="btn-full-detection">
          🔍 运行完整检测
        </button>
      </div>
    </header>

    <div id="message-container"></div>

    <main>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">总游戏数</div>
        </div>
        <div class="stat-card worth">
          <div class="stat-value" id="stat-worth">0</div>
          <div class="stat-label">值得做</div>
        </div>
        <div class="stat-card ignore">
          <div class="stat-value" id="stat-ignore">0</div>
          <div class="stat-label">忽略</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">待检测</div>
        </div>
      </div>

      <div class="panel">
        <h2>快速操作</h2>
        <div class="button-group">
          <button class="btn-action" id="btn-grab">📊 抓取游戏</button>
          <button class="btn-action" id="btn-trend">🔍 趋势检测</button>
          <button class="btn-action" id="btn-youtube">🎬 YouTube检测</button>
          <button class="btn-action" id="btn-update">🔄 更新评分</button>
          <button class="btn-action" id="btn-new-words">🆕 新词</button>
          <button class="btn-action" id="btn-refresh">🔃 刷新数据</button>
        </div>
      </div>

      <div class="panel">
        <h2>游戏列表 (<span id="game-count">0</span>)</h2>
        <div class="table-container">
          <table id="game-table">
            <thead>
              <tr>
                <th>游戏名称</th>
                <th>趋势分</th>
                <th>YouTube</th>
                <th>总分</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="game-tbody">
              <tr>
                <td colspan="5" class="empty-state">暂无游戏数据，请点击"运行完整检测"开始抓取</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>新词列表 (<span id="new-words-count">0</span>)</h2>
        <div class="table-container">
          <table id="new-words-table">
            <thead>
              <tr>
                <th>词</th>
                <th>新颖分</th>
                <th>最近出现</th>
                <th>总出现</th>
                <th>首次出现</th>
              </tr>
            </thead>
            <tbody id="new-words-tbody">
              <tr>
                <td colspan="5" class="empty-state">暂无新词数据，请点击“新词”加载</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>任务日志</h2>
        <div class="task-log" id="task-log">
          <div style="text-align: center; padding: 2rem; color: white;">暂无任务记录</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    var games = [];
    var tasks = [];
    var stats = { total: 0, worthDoing: 0, ignore: 0, pending: 0 };
    var API_BASE = (window.API_BASE || localStorage.getItem('API_BASE') || 'https://game-trend-radar-backend.railway.app/api');

    function showMessage(text, type) {
      var container = document.getElementById('message-container');
      var messageClass = 'message-box ' + (type || 'info');
      container.innerHTML = '<div class="' + messageClass + '">' + text + '</div>';
    }

    function addTaskLog(text) {
      var timestamp = new Date().toLocaleString('zh-CN');
      var logText = timestamp + ' - ' + text;
      tasks.push(logText);
      renderTaskLog();
    }

    function renderTaskLog() {
      var container = document.getElementById('task-log');
      if (tasks.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 2rem; color: white;">暂无任务记录</div>';
        return;
      }

      container.innerHTML = tasks.map(function (task) {
        var isError = task.indexOf('失败') !== -1 || task.indexOf('错误') !== -1;
        var isSuccess = task.indexOf('成功') !== -1;
        var indicatorClass = 'task-indicator';
        if (isError) indicatorClass += ' error';
        if (isSuccess) indicatorClass += ' success';

        return '<div class="task-item">' +
          '<div class="' + indicatorClass + '"></div>' +
          '<div class="task-text">' + task + '</div>' +
          '</div>';
      }).join('');
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-worth').textContent = stats.worthDoing;
      document.getElementById('stat-ignore').textContent = stats.ignore;
      document.getElementById('stat-pending').textContent = stats.pending;
      document.getElementById('game-count').textContent = games.length;
    }

    function renderGames() {
      var tbody = document.getElementById('game-tbody');

      if (games.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无游戏数据，请点击"运行完整检测"开始抓取</td></tr>';
        return;
      }

      tbody.innerHTML = games.map(function (game) {
        var statusClass = 'ignore';
        var statusText = '忽略';

        if (game.isCandidate || game.status === 'worth_doing') {
          statusClass = 'worth';
          statusText = '候选';
        } else if (game.status === 'pending') {
          statusClass = 'pending';
          statusText = '待检测';
        } else if (game.status === 'observe') {
          statusClass = 'observe';
          statusText = '观察';
        }

        var trendScoreValue = 0;
        if (typeof game.trendScore === 'object' && game.trendScore !== null) {
          trendScoreValue = game.trendScore.averageScore || game.trendScore.maxValue || 0;
        } else if (typeof game.trendScore === 'number') {
          trendScoreValue = game.trendScore;
        }

        if (trendScoreValue === 0 && game.newScore) {
          trendScoreValue = game.newScore;
        }

        var youtubeValue = game.ytScore || game.youtubeCount || 0;

        return '<tr>' +
          '<td>' + (game.gameName || game.name || '未知') + '</td>' +
          '<td>' + trendScoreValue + '</td>' +
          '<td>' + youtubeValue + '</td>' +
          '<td>' + (game.totalScore || game.newScore || game.newWordScore || 0) + '</td>' +
          '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
          '</tr>';
      }).join('');
    }

    function fetchGames() {
      showMessage('🔄 正在加载游戏数据...', 'info');
      addTaskLog('开始加载游戏数据...');

      fetch(API_BASE + '/games?candidate=true', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        credentials: 'omit'
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP错误: ' + response.status);
          }
          return response.json();
        })
        .then(function (data) {
          games = data;
          stats = {
            total: data.length,
            worthDoing: data.filter(function (g) { return g.isCandidate || g.status === 'worth_doing'; }).length,
            ignore: data.filter(function (g) { return !g.isCandidate && g.status !== 'worth_doing' && g.status !== 'pending'; }).length,
            pending: data.filter(function (g) { return g.status === 'pending'; }).length
          };
          updateStats();
          renderGames();
          showMessage('✅ 加载了 ' + data.length + ' 个游戏', 'success');
          addTaskLog('成功加载游戏数据');
        })
        .catch(function (err) {
          console.error('获取游戏数据错误:', err);
          showMessage('❌ 获取游戏数据出错: ' + err.message, 'error');
          addTaskLog('获取游戏数据出错: ' + err.message);

          setTimeout(function () {
            showMessage('🔄 正在重试连接...', 'info');
            fetchGames();
          }, 3000);
        });
    }

    function callApi(endpoint, actionName) {
      showMessage('🔄 正在' + actionName + '...', 'info');
      addTaskLog('开始' + actionName + '...');

      fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        credentials: 'omit'
      })
        .then(function (response) {
          if (response.ok) {
            showMessage('✅ ' + actionName + '成功！', 'success');
            addTaskLog(actionName + '成功');
            setTimeout(function () {
              fetchGames();
            }, 1000);
          } else {
            showMessage('❌ ' + actionName + '失败', 'error');
            addTaskLog(actionName + '失败');
          }
        })
        .catch(function (err) {
          console.error(actionName + '错误:', err);
          showMessage('❌ ' + actionName + '出错: ' + err.message, 'error');
          addTaskLog(actionName + '出错: ' + err.message);
        });
    }

    function renderNewWords(items) {
      var tbody = document.getElementById('new-words-tbody');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无新词数据，请点击“新词”加载</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(function (it) {
        var token = it.token || '';
        var novelty = it.noveltyScore || 0;
        var recent = it.recentCount || 0;
        var total = it.totalCount || 0;
        var first = it.firstSeenAt ? new Date(it.firstSeenAt).toLocaleString('zh-CN') : '';
        return '<tr>' +
          '<td>' + token + '</td>' +
          '<td>' + novelty + '</td>' +
          '<td>' + recent + '</td>' +
          '<td>' + total + '</td>' +
          '<td>' + first + '</td>' +
          '</tr>';
      }).join('');
    }

    function fetchNewWords() {
      showMessage('🔄 正在加载新词...', 'info');
      addTaskLog('开始加载新词...');
      fetch(API_BASE + '/new-words', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        credentials: 'omit'
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP错误: ' + response.status);
          }
          return response.json();
        })
        .then(function (data) {
          var items = Array.isArray(data.items) ? data.items.slice() : [];
          items.sort(function (a, b) { return (b.noveltyScore || 0) - (a.noveltyScore || 0); });
          renderNewWords(items);
          document.getElementById('new-words-count').textContent = items.length;
          showMessage('✅ 加载了 ' + items.length + ' 个新词', 'success');
          addTaskLog('成功加载新词');
        })
        .catch(function (err) {
          console.error('获取新词错误:', err);
          showMessage('❌ 获取新词出错: ' + err.message, 'error');
          addTaskLog('获取新词出错: ' + err.message);
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('btn-full-detection').addEventListener('click', function () {
        callApi('/daily-job', '执行完整检测');
      });

      document.getElementById('btn-grab').addEventListener('click', function () {
        callApi('/grab-games', '抓取游戏');
      });

      document.getElementById('btn-trend').addEventListener('click', function () {
        callApi('/detect-trends', '趋势检测');
      });

      document.getElementById('btn-youtube').addEventListener('click', function () {
        callApi('/detect-youtube', 'YouTube检测');
      });

      document.getElementById('btn-update').addEventListener('click', function () {
        callApi('/update-scores', '更新评分');
      });

      document.getElementById('btn-refresh').addEventListener('click', function () {
        fetchGames();
      });
      document.getElementById('btn-new-words').addEventListener('click', function () {
        fetchNewWords();
      });

      fetchGames();
    });
  </script>
</body>

</html>
