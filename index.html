<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameTrend Radar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f14;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .button {
      background: #007acc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .error {
      background: #ff4444;
      color: white;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    .success {
      background: #44ff44;
      color: black;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #1a2332;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      border: 2px solid;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .stat-label {
      color: #aaa;
      font-size: 0.9rem;
    }

    .games-table {
      background: #1a2332;
      border-radius: 10px;
      overflow: hidden;
    }

    .games-header {
      padding: 20px;
      border-bottom: 1px solid #2a3a4a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #2a3a4a;
    }

    th {
      color: #aaa;
      font-weight: normal;
    }

    tr:hover {
      background: #1e2a3a;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .status-worth {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    .status-observe {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .status-pending {
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
      border: 1px solid #eab308;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- 加载React和ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script>
    // 完整的GameTrend Radar应用
    function App() {
      const [games, setGames] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [message, setMessage] = React.useState('页面加载中...');
      const [error, setError] = React.useState(null);

      // 配置后端API地址
      const API_BASE_URL = 'https://game-trend-radar-backend.railway.app';

      // 从后端API获取游戏数据
      const fetchGames = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/games`);
          if (response.ok) {
            const data = await response.json();
            setGames(data);
            setMessage(`✅ 加载了 ${data.length} 个游戏`);
          } else {
            setMessage('❌ 获取游戏数据失败');
            setError(`HTTP错误: ${response.status}`);
          }
        } catch (err) {
          setMessage('❌ 获取游戏数据出错');
          setError(err.message);
        }
      };

      // 执行完整检测
      const runFullCheck = async () => {
        setLoading(true);
        setError(null);
        setMessage('🔄 正在执行完整检测...');

        try {
          const response = await fetch(`${API_BASE_URL}/api/daily-job`, { method: 'POST' });
          if (response.ok) {
            setMessage('✅ 完整检测执行成功！正在更新游戏数据...');
            // 检测完成后重新获取游戏数据
            setTimeout(fetchGames, 1000);
          } else {
            setMessage('❌ 完整检测执行失败');
            setError(`HTTP错误: ${response.status}`);
          }
        } catch (err) {
          setMessage('❌ 完整检测出错');
          setError(err.message);
        }

        setLoading(false);
      };

      // 组件加载时获取游戏数据
      React.useEffect(() => {
        fetchGames();
      }, []);

      // 统计数据
      const stats = {
        total: games.length,
        worthDoing: games.filter(g => g.status === 'worth_doing').length,
        observe: games.filter(g => g.status === 'observe').length,
        pending: games.filter(g => g.status === 'pending').length
      };

      const getStatusClass = (status) => {
        switch (status) {
          case 'worth_doing': return 'status-worth';
          case 'observe': return 'status-observe';
          default: return 'status-pending';
        }
      };

      const getStatusText = (status) => {
        switch (status) {
          case 'worth_doing': return '值得做';
          case 'observe': return '观察';
          default: return '待检测';
        }
      };

      // 渲染完整的界面
      return React.createElement('div', {
        style: {
          minHeight: '100vh',
          background: '#0a0f14',
          color: 'white',
          padding: '20px'
        }
      }, [
        // 头部
        React.createElement('div', {
          key: 'header',
          style: {
            textAlign: 'center',
            marginBottom: '30px',
            borderBottom: '1px solid #2a3a4a',
            paddingBottom: '20px'
          }
        }, [
          React.createElement('h1', {
            key: 'title',
            style: { fontSize: '2.5rem', marginBottom: '10px' }
          }, '🎮 GameTrend Radar'),
          React.createElement('p', {
            key: 'subtitle',
            style: { color: '#aaa', fontSize: '1.1rem' }
          }, 'HTML5 游戏趋势检测工具')
        ]),

        // 状态信息
        error && React.createElement('div', {
          key: 'error',
          style: {
            background: '#ff4444',
            color: 'white',
            padding: '10px',
            borderRadius: '5px',
            marginBottom: '20px'
          }
        }, `错误信息: ${error}`),

        React.createElement('div', {
          key: 'message',
          style: {
            background: message.includes('✅') ? '#44ff44' : message.includes('❌') ? '#ff4444' : '#007acc',
            color: message.includes('✅') ? 'black' : 'white',
            padding: '10px',
            borderRadius: '5px',
            marginBottom: '20px',
            fontWeight: 'bold'
          }
        }, message),

        // 操作按钮
        React.createElement('div', {
          key: 'buttons',
          style: {
            display: 'flex',
            gap: '10px',
            justifyContent: 'center',
            marginBottom: '30px'
          }
        }, [
          React.createElement('button', {
            key: 'refresh',
            onClick: fetchGames,
            disabled: loading,
            style: {
              background: '#007acc',
              color: 'white',
              border: 'none',
              padding: '12px 24px',
              borderRadius: '5px',
              cursor: 'pointer',
              fontSize: '1rem'
            }
          }, '刷新数据'),

          React.createElement('button', {
            key: 'run-check',
            onClick: runFullCheck,
            disabled: loading,
            style: {
              background: '#28a745',
              color: 'white',
              border: 'none',
              padding: '12px 24px',
              borderRadius: '5px',
              cursor: 'pointer',
              fontSize: '1rem'
            }
          }, loading ? '执行中...' : '执行完整检测')
        ]),

        // 统计数据
        React.createElement('div', {
          key: 'stats',
          className: 'stats-grid'
        }, [
          React.createElement('div', {
            key: 'total',
            className: 'stat-card',
            style: { borderColor: '#666' }
          }, [
            React.createElement('div', {
              key: 'total-value',
              className: 'stat-value',
              style: { color: 'white' }
            }, stats.total),
            React.createElement('div', {
              key: 'total-label',
              className: 'stat-label'
            }, '总游戏数')
          ]),

          React.createElement('div', {
            key: 'worth-doing',
            className: 'stat-card',
            style: { borderColor: '#22c55e' }
          }, [
            React.createElement('div', {
              key: 'worth-doing-value',
              className: 'stat-value',
              style: { color: '#22c55e' }
            }, stats.worthDoing),
            React.createElement('div', {
              key: 'worth-doing-label',
              className: 'stat-label'
            }, '值得做')
          ]),

          React.createElement('div', {
            key: 'observe',
            className: 'stat-card',
            style: { borderColor: '#ef4444' }
          }, [
            React.createElement('div', {
              key: 'observe-value',
              className: 'stat-value',
              style: { color: '#ef4444' }
            }, stats.observe),
            React.createElement('div', {
              key: 'observe-label',
              className: 'stat-label'
            }, '观察')
          ]),

          React.createElement('div', {
            key: 'pending',
            className: 'stat-card',
            style: { borderColor: '#eab308' }
          }, [
            React.createElement('div', {
              key: 'pending-value',
              className: 'stat-value',
              style: { color: '#eab308' }
            }, stats.pending),
            React.createElement('div', {
              key: 'pending-label',
              className: 'stat-label'
            }, '待检测')
          ])
        ]),

        // 游戏列表
        React.createElement('div', {
          key: 'games',
          className: 'games-table'
        }, [
          React.createElement('div', {
            key: 'games-header',
            className: 'games-header'
          }, React.createElement('h2', {
            style: { margin: 0 }
          }, `游戏列表 (${games.length})`)),

          React.createElement('div', {
            key: 'games-content',
            style: { overflowX: 'auto' }
          }, React.createElement('table', {}, [
            React.createElement('thead', { key: 'thead' }, React.createElement('tr', {}, [
              React.createElement('th', { key: 'name' }, '游戏名称'),
              React.createElement('th', { key: 'source' }, '来源'),
              React.createElement('th', { key: 'trend' }, '趋势分'),
              React.createElement('th', { key: 'youtube' }, 'YOUTUBE'),
              React.createElement('th', { key: 'total' }, '总分'),
              React.createElement('th', { key: 'status' }, '状态')
            ])),

            React.createElement('tbody', { key: 'tbody' },
              games.length === 0 ?
                React.createElement('tr', { key: 'empty' }, React.createElement('td', {
                  colSpan: 6,
                  style: {
                    textAlign: 'center',
                    padding: '40px',
                    color: '#aaa'
                  }
                }, '暂无游戏数据，请点击"执行完整检测"开始抓取')) :
                games.map((game, index) => React.createElement('tr', {
                  key: game.id || index
                }, [
                  React.createElement('td', { key: 'name' }, game.gameName || '未知'),
                  React.createElement('td', { key: 'source' }, game.source || '未知'),
                  React.createElement('td', { key: 'trend' }, game.trendScore || 0),
                  React.createElement('td', { key: 'youtube' }, game.ytScore || 0),
                  React.createElement('td', { key: 'total' }, game.totalScore || 0),
                  React.createElement('td', { key: 'status' },
                    React.createElement('span', {
                      className: getStatusClass(game.status)
                    }, getStatusText(game.status))
                  )
                ]))
            )
          ]))
        ])
      ]);
    }

    // 渲染组件，并添加错误处理
    try {
      const root = document.getElementById('root');
      if (root) {
        ReactDOM.createRoot(root).render(React.createElement(App));
      } else {
        document.body.innerHTML = '<div style="color: red; padding: 20px;">错误: 找不到根元素 #root</div>';
      }
    } catch (error) {
      document.body.innerHTML = '<div style="color: red; padding: 20px;">React渲染错误: ' + error.message + '</div>';
    }
  </script>
</body>

</html>
