<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Trend Radar</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

</head>


<body class="bg-slate-50 text-slate-800">

  <div class="flex min-h-screen">

    <!-- Sidebar -->

    <aside class="w-64 bg-white border-r p-6">

      <div class="flex items-center space-x-2 mb-10">

        <i class="fa fa-line-chart text-blue-600 text-2xl"></i>

        <span class="font-bold text-lg">Trend Radar</span>

      </div>

      <nav class="space-y-3">

        <button class="tab-btn text-blue-600" data-tab="exploding">
          <i class="fa fa-rocket mr-2"></i>爆发趋势
        </button>

        <button class="tab-btn text-gray-600" data-tab="early">
          <i class="fa fa-seedling mr-2"></i>早期趋势
        </button>

        <button class="tab-btn text-gray-600" data-tab="all">
          <i class="fa fa-list mr-2"></i>全部趋势
        </button>

        <button class="tab-btn text-gray-600" data-tab="new-words">
          <i class="fa fa-book mr-2"></i>新词
        </button>

      </nav>

    </aside>


    <!-- Main -->

    <main class="flex-1 p-8">

      <!-- Header -->

      <div class="flex justify-between items-center mb-8">

        <h1 class="text-2xl font-bold">
          Game Trend Radar
        </h1>

        <button id="runJobBtn" class="bg-blue-600 text-white px-5 py-2 rounded-lg">

          <i class="fa fa-refresh mr-2"></i>
          运行检测

        </button>

      </div>


      <!-- Stats -->

      <div class="grid grid-cols-4 gap-6 mb-8">

        <div class="bg-white p-6 rounded-xl shadow">

          <div class="text-gray-500 text-sm">爆发趋势</div>

          <div class="text-2xl font-bold" id="exploding-count">0</div>

        </div>

        <div class="bg-white p-6 rounded-xl shadow">

          <div class="text-gray-500 text-sm">早期趋势</div>

          <div class="text-2xl font-bold" id="early-count">0</div>

        </div>

        <div class="bg-white p-6 rounded-xl shadow">

          <div class="text-gray-500 text-sm">全部趋势</div>

          <div class="text-2xl font-bold" id="all-count">0</div>

        </div>

        <div class="bg-white p-6 rounded-xl shadow">

          <div class="text-gray-500 text-sm">新词</div>

          <div class="text-2xl font-bold" id="new-words-count">0</div>

        </div>

      </div>


      <!-- Table -->

      <div class="bg-white rounded-xl shadow">

        <div class="p-6 border-b font-semibold">
          趋势数据
        </div>

        <div class="overflow-x-auto">

          <table class="min-w-full text-sm">

            <thead class="bg-gray-50 text-gray-600">

              <tr>

                <th class="px-6 py-3 text-left">关键词</th>
                <th class="px-6 py-3 text-left">预测</th>
                <th class="px-6 py-3 text-left">增长</th>
                <th class="px-6 py-3 text-left">加速度</th>
                <th class="px-6 py-3 text-left">平台</th>
                <th class="px-6 py-3 text-left">AI</th>
                <th class="px-6 py-3 text-left">首次发现</th>

              </tr>

            </thead>

            <tbody id="table-body">

              <tr>

                <td class="px-6 py-4 text-gray-500">
                  加载中...
                </td>

              </tr>

            </tbody>

          </table>

        </div>

      </div>


      <!-- Log -->

      <div class="mt-8 bg-white rounded-xl shadow p-6">

        <h2 class="font-semibold mb-4">
          任务日志
        </h2>

        <div id="task-log" class="h-48 overflow-y-auto text-sm text-gray-600">

          等待任务执行...

        </div>

      </div>

    </main>

  </div>


  <script>

    const API_BASE = "https://gametrenradar-backend-production.up.railway.app/api"

    let currentTab = "exploding"

    async function fetchData(endpoint) {

      const res = await fetch(API_BASE + endpoint)

      return await res.json()

    }


    function renderTable(data) {

      const table = document.getElementById("table-body")

      if (!data.length) {

        table.innerHTML = `<tr><td class="px-6 py-4">暂无数据</td></tr>`

        return

      }

      table.innerHTML = data.map(t => `

<tr class="border-t">

<td class="px-6 py-4 font-medium">
${t.word || t.keyword}
</td>

<td class="px-6 py-4">
${t.prediction || 0}
</td>

<td class="px-6 py-4">
${(t.growthRate || 0).toFixed(2)}
</td>

<td class="px-6 py-4">
${(t.acceleration || 0).toFixed(2)}
</td>

<td class="px-6 py-4">
${t.platformScore || 0}
</td>

<td class="px-6 py-4">
${t.aiScore || 0}
</td>

<td class="px-6 py-4 text-gray-500">
${t.firstSeenAt ? new Date(t.firstSeenAt).toLocaleDateString() : "-"}
</td>

</tr>

`).join("")

    }


    async function loadTab(tab) {

      currentTab = tab

      let endpoint = "/trend/exploding"

      if (tab === "early") endpoint = "/trend/early"
      if (tab === "all") endpoint = "/trend/all"

      if (tab === "new-words") {

        const data = await fetchData("/new-words")

        document.getElementById("new-words-count").textContent = data.items.length

        renderTable(data.items)

        return

      }

      const data = await fetchData(endpoint)

      renderTable(data)

      document.getElementById(tab + "-count").textContent = data.length

    }


    document.querySelectorAll(".tab-btn").forEach(btn => {

      btn.onclick = () => loadTab(btn.dataset.tab)

    })


    document.getElementById("runJobBtn").onclick = async () => {

      await fetch(API_BASE + "/daily-job", { method: "POST" })

      log("任务触发成功")

    }


    function log(msg) {

      const logDiv = document.getElementById("task-log")

      logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} ${msg}</div>`

    }


    loadTab("exploding")

  </script>

</body>

</html>
