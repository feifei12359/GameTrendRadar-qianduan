<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏趋势雷达</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 1rem;
      font-size: 2rem;
    }
    .status {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
    }
    .status.error {
      background: #ffebee;
      color: #d32f2f;
    }
    section {
      margin-bottom: 2rem;
    }
    h2 {
      color: #555;
      margin-bottom: 1rem;
      font-size: 1.5rem;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }
    ul {
      list-style: none;
    }
    li {
      padding: 0.75rem;
      background: #f5f5f5;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s;
    }
    li:hover {
      transform: translateX(5px);
      background: #e8e8e8;
    }
    .count {
      background: #667eea;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .empty {
      color: #999;
      font-style: italic;
      padding: 1rem;
      text-align: center;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 1rem;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 游戏趋势雷达</h1>
    <div id="status" class="status loading">
      <span class="loading-spinner"></span>
      正在加载数据…
    </div>

    <section>
      <h2>📈 早期趋势 (Early Trends)</h2>
      <div id="earlyTrends">
        <p class="empty">暂无数据，请先触发每日抓取任务。</p>
      </div>
    </section>

    <section>
      <h2>🆕 新词 (New Words)</h2>
      <div id="newWords">
        <p class="empty">暂无数据，请先触发每日抓取任务。</p>
      </div>
    </section>

    <button id="triggerBtn" onclick="triggerDailyJob()">
      🚀 一键触发每日抓取任务
    </button>
  </div>

  <script>
    const API_BASE = 'https://gametrendradar-backend-production.up.railway.app';

    function updateStatus(message, type = 'loading') {
      const statusEl = document.getElementById('status');
      statusEl.className = `status ${type}`;
      if (type === 'loading') {
        statusEl.innerHTML = `<span class="loading-spinner"></span>${message}`;
      } else {
        statusEl.textContent = message;
      }
    }

    function renderList(containerId, data) {
      const container = document.getElementById(containerId);
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="empty">暂无数据，请先触发每日抓取任务。</p>';
        return;
      }
      
      const ul = document.createElement('ul');
      data.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${item.name}</span>
          ${item.count ? `<span class="count">${item.count}</span>` : ''}
        `;
        ul.appendChild(li);
      });
      container.innerHTML = '';
      container.appendChild(ul);
    }

    async function fetchData() {
      try {
        updateStatus('请求早期趋势数据…', 'loading');
        const earlyRes = await fetch(`${API_BASE}/api/trend/early`);
        if (!earlyRes.ok) throw new Error('早期趋势接口返回404或错误');
        const earlyData = await earlyRes.json();
        renderList('earlyTrends', earlyData);

        updateStatus('请求新词数据…', 'loading');
        const newWordsRes = await fetch(`${API_BASE}/api/new-words`);
        if (!newWordsRes.ok) throw new Error('新词接口返回404或错误');
        const newWordsData = await newWordsRes.json();
        renderList('newWords', newWordsData);

        updateStatus('✅ 数据加载成功', 'success');
      } catch (err) {
        console.error(err);
        updateStatus(`❌ 请求失败: ${err.message}`, 'error');
      }
    }

    async function triggerDailyJob() {
      const btn = document.getElementById('triggerBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 任务执行中…';
      
      try {
        const res = await fetch(`${API_BASE}/api/daily-job`, { 
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        if (!res.ok) throw new Error('触发抓取任务失败');
        
        alert('✅ 已触发每日抓取任务，请稍后刷新页面查看数据');
        
        // 3秒后自动刷新数据
        setTimeout(() => {
          fetchData();
        }, 3000);
      } catch (err) {
        alert(`❌ 任务失败: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 一键触发每日抓取任务';
      }
    }

    // 页面加载时自动获取数据
    document.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
